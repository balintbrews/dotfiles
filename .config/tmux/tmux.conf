# Remap the prefix from C-b to C-a.
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start window numbering at 1.
set -g base-index 1

# Allow mouse interactions.
set -g mouse on

# Keep the status line minimal and centered.
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=default,fg=default"
set -g status-left-length 24
set -g status-right-length 24

# Show the session name on the left and date/time on the right.
set -g status-left "#[dim] #S #[nodim]"
set -g status-right "#[dim]%a %b %d #[nodim]%H:%M "

# Use compact window labels with clearer active/activity states.
set -g window-status-separator ""
set -g window-status-format "#[dim]#[range=window|#{window_index}] #I:#W #[norange]#[default]#{?window_end_flag,,  }"
set -g window-status-current-format "#[reverse,bold]#[range=window|#{window_index}] #I:#W #[norange]#[default]#{?window_end_flag,,  }"
set -g window-status-activity-style "underscore"
set -g window-status-bell-style "reverse,bold"

# Build a two-line status bar with a padded top row.
set -g status 2
set -g status-format[0] "#[bg=default] "
set -g status-format[1] "#[align=left]#{T:status-left}#[align=#{status-justify}]#{W:#{E:window-status-format},#{E:window-status-current-format}}#[align=right]#{T:status-right}"
